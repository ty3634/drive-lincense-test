<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean Driving License Practice / 한국 운전면허 연습</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:1rem}
.screen{display:none}.screen.active{display:block}

/* START */
.start-wrap{padding:2rem 0;text-align:center}
h1{font-size:22px;font-weight:600;margin-bottom:6px}
.sub{font-size:14px;color:#666;margin-bottom:2rem;line-height:1.6}
.type-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.type-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;padding:1.25rem 1rem;cursor:pointer;transition:border-color .15s;text-align:center}
.type-card:hover{border-color:#aaa}
.type-card.selected{border-color:#2563eb;background:#eff6ff}
.type-card .label{font-size:16px;font-weight:600;margin-bottom:6px}
.type-card .score{font-size:28px;font-weight:700;color:#2563eb}
.type-card .pass{font-size:13px;color:#666}
.info-row{display:flex;gap:10px;margin-bottom:1.5rem}
.info-item{flex:1;background:#fff;border-radius:10px;padding:.75rem;text-align:center;border:1px solid #e0e0e0}
.info-item .val{font-size:18px;font-weight:600}
.info-item .lbl{font-size:12px;color:#666;margin-top:2px}
.btn-main{width:100%;padding:.85rem;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn-main:disabled{opacity:.4;cursor:default}
.btn-main:hover:not(:disabled){background:#1d4ed8}

/* EXAM */
.exam-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.progress-wrap{flex:1}
.progress-bar{height:5px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#2563eb;transition:width .3s}
.progress-text{font-size:12px;color:#666;margin-top:4px}
.timer{font-size:18px;font-weight:600;min-width:62px;text-align:right;font-variant-numeric:tabular-nums}
.timer.warn{color:#dc2626}
.q-card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:1rem;border:1px solid #e0e0e0}
.q-num{font-size:12px;color:#666;margin-bottom:.5rem}
.q-text{font-size:15px;line-height:1.65;min-height:50px}
.hint{font-size:12px;color:#2563eb;background:#eff6ff;border-radius:6px;padding:6px 10px;margin-bottom:.75rem}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.opt{display:flex;align-items:flex-start;gap:10px;padding:.75rem 1rem;background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;cursor:pointer;font-size:14px;line-height:1.55;transition:border-color .1s}
.opt:hover{border-color:#aaa}
.opt.selected{border-color:#2563eb;background:#eff6ff}
.opt .circle{width:24px;height:24px;min-width:24px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.opt.selected .circle{background:#2563eb;color:#fff;border-color:#2563eb}
.nav-row{display:flex;gap:8px}
.btn-sec{flex:1;padding:.65rem;border:1.5px solid #ccc;border-radius:9px;background:#fff;font-size:14px;cursor:pointer;color:#333}
.btn-sec:hover{background:#f5f5f5}
.btn-submit{flex:2;padding:.65rem;background:#2563eb;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer}
.btn-submit:hover{background:#1d4ed8}

/* RESULT */
.result-wrap{padding:1.5rem 0}
.result-badge{text-align:center;padding:2rem;border-radius:14px;margin-bottom:1.25rem;border:2px solid}
.result-badge.pass{background:#f0fdf4;border-color:#16a34a}
.result-badge.fail{background:#fef2f2;border-color:#dc2626}
.verdict{font-size:28px;font-weight:700;margin-bottom:.5rem}
.pass .verdict{color:#16a34a}
.fail .verdict{color:#dc2626}
.score-big{font-size:52px;font-weight:700}
.score-lbl{font-size:14px;color:#666;margin-top:4px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat-item{background:#fff;border-radius:10px;padding:.75rem;text-align:center;border:1px solid #e0e0e0}
.stat-item .val{font-size:20px;font-weight:600}
.stat-item .lbl{font-size:12px;color:#666;margin-top:2px}
.wrong-section h3{font-size:15px;font-weight:600;margin-bottom:.75rem}
.wrong-item{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:.9rem;margin-bottom:8px}
.wq{font-size:13px;line-height:1.55;margin-bottom:.5rem}
.wrow{font-size:12px;margin-bottom:3px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;margin-right:4px;font-size:11px}
.tag.my{background:#fee2e2;color:#991b1b}
.tag.ok{background:#dcfce7;color:#166534}
.result-actions{display:flex;gap:10px;margin-top:1.5rem}
</style>
</head>
<body>
<div class="container">

<div id="screen-start" class="screen active">
<div class="start-wrap">
  <h1>&#x1F697; Korean Driving License</h1>
  <p class="sub">1,000문제 문제은행 &middot; Ngân hàng 1,000 câu hỏi<br>Choose your exam type / 시험 종류를 선택하세요</p>
  <div class="type-cards">
    <div class="type-card" id="card-1">
      <div class="label">1종 보통</div>
      <div class="score">70점</div>
      <div class="pass">이상 합격</div>
    </div>
    <div class="type-card" id="card-2">
      <div class="label">2종 보통</div>
      <div class="score">60점</div>
      <div class="pass">이상 합격</div>
    </div>
  </div>
  <div class="info-row">
    <div class="info-item"><div class="val">40</div><div class="lbl">Questions</div></div>
    <div class="info-item"><div class="val">40분</div><div class="lbl">Time Limit</div></div>
    <div class="info-item"><div class="val">2.5점</div><div class="lbl">Per Question</div></div>
  </div>
  <button class="btn-main" id="btn-start" disabled>Start Exam / 시험 시작</button>
</div>
</div>

<div id="screen-exam" class="screen">
  <div class="exam-header">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
      <div class="progress-text" id="ptext"></div>
    </div>
    <div class="timer" id="timer">40:00</div>
  </div>
  <div class="q-card">
    <div class="q-num" id="qnum"></div>
    <div class="q-text" id="qtext"></div>
  </div>
  <div class="hint" id="hint" style="display:none"></div>
  <div class="opts" id="opts"></div>
  <div class="nav-row">
    <button class="btn-sec" id="btn-prev">&#x25C4; Prev</button>
    <button class="btn-sec" id="btn-next">Next &#x25BA;</button>
    <button class="btn-submit" id="btn-submit" style="display:none;">Submit / 제출</button>
  </div>
</div>

<div id="screen-result" class="screen">
<div class="result-wrap">
  <div class="result-badge" id="rbadge">
    <div class="verdict" id="verdict"></div>
    <div class="score-big" id="sbig"></div>
    <div class="score-lbl" id="slbl"></div>
  </div>
  <div class="stat-grid">
    <div class="stat-item"><div class="val" id="sc"></div><div class="lbl">Correct &#x2713;</div></div>
    <div class="stat-item"><div class="val" id="sw"></div><div class="lbl">Wrong &#x2717;</div></div>
    <div class="stat-item"><div class="val" id="sp"></div><div class="lbl">Pass Score</div></div>
  </div>
  <div class="wrong-section">
    <h3 id="wtitle"></h3>
    <div id="wlist"></div>
  </div>
  <div class="result-actions">
    <button class="btn-sec" style="flex:1" id="btn-retry">Retry / 다시 풀기</button>
    <button class="btn-main" style="flex:1;width:auto" id="btn-home">Home / 처음으로</button>
  </div>
</div>
</div>

</div>

<script>
// 원본 Base64 문항 데이터 전체 보존
const B64="W3siaSI6MSwicSI6IsSQaeG7gXUgbsOgbyBzYXUgxJHDonkgbMOgIHRo4bunIHThu6VjIMSRw7puZyDEkeG7gyBj4bqlcCBnaeG6pXkgcGjDqXAgbMOhaSB4ZSBkaSDEkeG7mW5nPyIsIm8iOlsiQ8OzIHRo4buDIG7hu5lwIMSRxINuZyBrw70gdHLDqm4gbeG7jWkg4bupbmcgZOG7pW5nLiIsIlBo4bqjaSDEkcSDbmcga8O9IGLhurFuZyDEkWnhu4duIHRob+G6oWkgdGjDtG5nIMSRxrVvbmcgdGjDtG5nIG1pbmggxJHGeG7p25nIHRgZW4gY2jDrW5oIGNo4bunIHYmY gravesYyB0aOG7sWMgZGFuaCB0w61uaC4iLCJDaOG7iSBjw7MgdGjhu4MgxJHEg25nIGvDvSB04bqhaSBi4buZIHBo4bqtbiB0aeG6v3Agbmjhuq1uIGtoaeG6v3UgbuG6oWkgZ2lhbyB0aMO0bmcgY+G7p2EgxJHhu5NuIGPDtG5nIGFuLiIsIktow7RuZyB0aOG7gyBj4bqlcCB04bqhaSB0cnVuZyB0w6JtIHPDoXQgaOW6oWNoIGzDoWkgeGUuIl0sImEiOlsyXX0seyJpIjoyLCJxIjoiR2nhuqNpIHRow61jaCBuw6BvIGzDoCBraMO0bmcgxJHDum5nIHbHu4EgY+G6pXAgR2nhuqV5IHBow6lwIGzDoWkgeGUgdGhlbyBQaMOhcCBs4buHbmggR2lhbyB0aMO0bmcgxJHGsOG7nW5nIGLhu5k/IiwibyI6WyJHaeG6pXkgcGjDqXAgbMOhaSB4ZSBwaOG6o2kgxJHGsOG7o2MgY+G6pXAgdHJvbmcgdsOybmcgMzAgbmfDoHkga+G7gyB04burIG5nw6B5IMSR4buXIEvhu7MgdGhpIHPDoXQgaOW6oWNoIGLhurFuZyBsw6FpIHhlLiIsIktow7RuZyB0aOG7gyBj4bqlcCBHaeG6pXkgcGjDqXAgbMOhaSB4ZSBi4bqxbmcgdGnhur9uZyBBbmguIiwiQ8OzIHRo4buDIGPhuqVwIEdp4bqleSBwaMOpcCBsw6FpIHhlIHRyw6puIMSRaeG7h24gdGhv4bqhaS4iLCJO4bq/dSBi4buLIG3huqV0IEdp4bqleSBwaMOpcCBsw6FpIHhlLCBjw7MgdG/DoSB4aW4gY8G6cCBs4bqhaS4iXSwiYSI6WzJdfV0=";

let ALL_QUESTIONS = [];
let currentExam = [];
let currentIdx = 0;
let userAnswers = {};
let selectedType = null; 
let timerID = null;
let timeLeft = 2400; 

// Base64 디코딩 및 파싱
try {
  const decoded = decodeURIComponent(atob(B64).split('').map(function(c) {
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  ALL_QUESTIONS = JSON.parse(decoded);
} catch(e) {
  console.error("데이터 로드 실패:", e);
}

// 화면 전환
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screenId).classList.add('active');
}

// 면허 종류 선택 (★버튼 비활성화 해제 완벽 수정부★)
function selectType(typeNum) {
  selectedType = typeNum;
  
  // 원본 CSS 규칙인 .selected에 매칭되도록 클래스 토글
  document.getElementById('card-1').classList.remove('selected');
  document.getElementById('card-2').classList.remove('selected');
  document.getElementById('card-' + typeNum).classList.add('selected');
  
  // 브라우저의 강력한 disabled 락을 해제하기 위해 속성을 완전히 제거합니다.
  const startBtn = document.getElementById('btn-start');
  startBtn.removeAttribute('disabled');
}

// 시험 시작
function startExam() {
  if (!selectedType) return;
  
  // 무작위 문항 배치
  let pool = [...ALL_QUESTIONS];
  pool.sort(() => 0.5 - Math.random());
  currentExam = pool.slice(0, 40);
  
  currentIdx = 0;
  userAnswers = {};
  timeLeft = 2400; 
  
  clearInterval(timerID);
  updateTimerUI();
  timerID = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerID);
      alert("Thời gian đã hết! / 시간이 종료되었습니다.");
      finishExam();
    }
  }, 1000);
  
  renderQuestion();
  showScreen('exam');
}

// 타이머 표시
function updateTimerUI() {
  const min = Math.floor(timeLeft / 60);
  const sec = timeLeft % 60;
  const timerEl = document.getElementById('timer');
  timerEl.textContent = (min < 10 ? '0' : '') + min + ':' + (sec < 10 ? '0' : '') + sec;
  
  if (timeLeft < 300) {
    timerEl.classList.add('warn');
  } else {
    timerEl.classList.remove('warn');
  }
}

// 문제 및 보기 그리기
function renderQuestion() {
  if (currentExam.length === 0) return;
  const q = currentExam[currentIdx];
  
  // 상단 진행바 연산
  const progressPercent = ((currentIdx + 1) / currentExam.length) * 100;
  document.getElementById('pfill').style.width = progressPercent + '%';
  document.getElementById('ptext').textContent = `Câu ${currentIdx + 1} trên ${currentExam.length}`;
  
  document.getElementById('qnum').textContent = `Câu hỏi ${currentIdx + 1}`;
  document.getElementById('qtext').textContent = q.q || "";
  
  // 복수 정답 가이드 제어
  const hintEl = document.getElementById('hint');
  if (q.a && q.a.length > 1) {
    hintEl.textContent = `Chọn ${q.a.length} đáp án đúng (복수 정답: ${q.a.length}개 선택)`;
    hintEl.style.display = 'block';
  } else {
    hintEl.style.display = 'none';
  }
  
  // 보기 리스트 빌드
  const optsContainer = document.getElementById('opts');
  optsContainer.innerHTML = '';
  
  const optionsList = q.o || [];
  const currentSelections = userAnswers[currentIdx] || [];
  
  optionsList.forEach((optText, idx) => {
    const optId = idx + 1;
    const div = document.createElement('div');
    div.className = 'opt';
    if (currentSelections.includes(optId)) {
      div.classList.add('selected');
    }
    
    const circle = document.createElement('div');
    circle.className = 'circle';
    circle.textContent = optId;
    
    const textSpan = document.createElement('span');
    textSpan.textContent = optText;
    
    div.appendChild(circle);
    div.appendChild(textSpan);
    
    div.addEventListener('click', () => {
      let selections = userAnswers[currentIdx] ? [...userAnswers[currentIdx]] : [];
      const maxAllowed = (q.a && q.a.length > 0) ? q.a.length : 1;
      
      if (selections.includes(optId)) {
        selections = selections.filter(id => id !== optId);
      } else {
        if (maxAllowed === 1) {
          selections = [optId];
        } else {
          if (selections.length < maxAllowed) {
            selections.push(optId);
          } else {
            selections.shift();
            selections.push(optId);
          }
        }
      }
      userAnswers[currentIdx] = selections;
      renderQuestion();
    });
    
    optsContainer.appendChild(div);
  });
  
  // 다음/제출 네비게이션 제어
  document.getElementById('btn-prev').style.visibility = (currentIdx === 0) ? 'hidden' : 'visible';
  
  const nextBtn = document.getElementById('btn-next');
  const submitBtn = document.getElementById('btn-submit');
  
  if (currentIdx === currentExam.length - 1) {
    nextBtn.style.display = 'none';
    submitBtn.style.display = 'block';
  } else {
    nextBtn.style.display = 'block';
    submitBtn.style.display = 'none';
  }
}

function prevQ() { if (currentIdx > 0) { currentIdx--; renderQuestion(); } }
function nextQ() { if (currentIdx < currentExam.length - 1) { currentIdx++; renderQuestion(); } }

// 제출 확인
function confirmSubmit() {
  const answeredCount = Object.keys(userAnswers).filter(k => userAnswers[k] && userAnswers[k].length > 0).length;
  let confirmMsg = "Bạn có chắc chắn muốn nộp bài?";
  if (answeredCount < currentExam.length) {
    confirmMsg = `Bạn chưa trả lời hết (${answeredCount}/${currentExam.length} câu). Vẫn muốn nộp bài?`;
  }
  if (confirm(confirmMsg)) {
    clearInterval(timerID);
    finishExam();
  }
}

// 채점 및 결과 노출
function finishExam() {
  let correctCount = 0;
  const wlist = document.getElementById('wlist');
  wlist.innerHTML = '';
  
  currentExam.forEach((q, wi) => {
    const myAns = userAnswers[wi] ? [...userAnswers[wi]].sort((a,b)=>a-b) : [];
    const corrAns = q.a ? [...q.a].sort((a,b)=>a-b) : [];
    const isCorrect = (myAns.length === corrAns.length) && myAns.every((val, i) => val === corrAns[i]);
    
    if (isCorrect) {
      correctCount++;
    } else {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      
      const wq = document.createElement('div');
      wq.className = 'wq';
      wq.innerHTML = `<b>Q${wi + 1}.</b> ${q.q}`;
      
      const r1 = document.createElement('div');
      r1.className = 'wrow';
      const t1 = document.createElement('span');
      t1.className = 'tag my';
      const myStr = myAns.length > 0 ? myAns.map(idx => q.o[idx - 1]).join(' / ') : 'Không trả lời';
      t1.textContent = 'Lựa chọn của bạn: ' + myStr;
      r1.appendChild(t1);
      
      const r2 = document.createElement('div');
      r2.className = 'wrow';
      const t2 = document.createElement('span');
      t2.className = 'tag ok';
      const corrStr = corrAns.map(idx => q.o[idx - 1]).join(' / ');
      t2.textContent = 'Đáp án đúng: ' + corrStr;
      r2.appendChild(t2);
      
      div.appendChild(wq);
      div.appendChild(r1);
      div.appendChild(r2);
      wlist.appendChild(div);
    }
  });
  
  const finalScore = correctCount * 2.5;
  const passScore = (selectedType === 1) ? 70 : 60; 
  const isPass = finalScore >= passScore;
  
  document.getElementById('sbig').textContent = `${finalScore}점`;
  document.getElementById('slbl').textContent = `Kết quả: ${correctCount} / 40 Câu đúng`;
  document.getElementById('sc').textContent = correctCount;
  document.getElementById('sw').textContent = currentExam.length - correctCount;
  document.getElementById('sp').textContent = `${passScore}점`;
  
  const badge = document.getElementById('rbadge');
  const verdict = document.getElementById('verdict');
  
  if (isPass) {
    badge.className = "result-badge pass";
    verdict.textContent = "ĐẠT (ĐẬU)";
  } else {
    badge.className = "result-badge fail";
    verdict.textContent = "KHÔNG ĐẠT (TRƯỢT)";
  }
  
  document.getElementById('wtitle').textContent = `Xem lại câu sai (${currentExam.length - correctCount} câu)`;
  showScreen('result');
}

function retryExam() { startExam(); }
function goHome() { clearInterval(timerID); showScreen('start'); }

// 이벤트 리스너 바인딩
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('card-1').addEventListener('click', function(){ selectType(1); });
  document.getElementById('card-2').addEventListener('click', function(){ selectType(2); });
  document.getElementById('btn-start').addEventListener('click', startExam);
  document.getElementById('btn-prev').addEventListener('click', prevQ);
  document.getElementById('btn-next').addEventListener('click', nextQ);
  document.getElementById('btn-submit').addEventListener('click', confirmSubmit);
  document.getElementById('btn-retry').addEventListener('click', retryExam);
  document.getElementById('btn-home').addEventListener('click', goHome);
});
</script>
</body>
</html>
