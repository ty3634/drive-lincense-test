<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean Driving License Practice / 한국 운전면허 연습</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:1rem}
.screen{display:none}.screen.active{display:block}

/* START */
.start-wrap{padding:2rem 0;text-align:center}
h1{font-size:22px;font-weight:600;margin-bottom:6px}
.sub{font-size:14px;color:#666;margin-bottom:2rem;line-height:1.6}
.type-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.type-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;padding:1.25rem 1rem;cursor:pointer;transition:border-color .15s;text-align:center}
.type-card:hover{border-color:#aaa}
.type-card.selected{border-color:#2563eb;background:#eff6ff}
.type-card .label{font-size:16px;font-weight:600;margin-bottom:6px}
.type-card .score{font-size:28px;font-weight:700;color:#2563eb}
.type-card .pass{font-size:13px;color:#666}
.info-row{display:flex;gap:10px;margin-bottom:1.5rem}
.info-item{flex:1;background:#fff;border-radius:10px;padding:.75rem;text-align:center;border:1px solid #e0e0e0}
.info-item .val{font-size:18px;font-weight:600}
.info-item .lbl{font-size:12px;color:#666;margin-top:2px}
.btn-main{width:100%;padding:.85rem;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn-main:disabled{opacity:.4;cursor:default}
.btn-main:hover:not(:disabled){background:#1d4ed8}

/* EXAM */
.exam-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.progress-wrap{flex:1}
.progress-bar{height:5px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#2563eb;transition:width .3s}
.progress-text{font-size:12px;color:#666;margin-top:4px}
.timer{font-size:18px;font-weight:600;min-width:62px;text-align:right;font-variant-numeric:tabular-nums}
.timer.warn{color:#dc2626}
.q-card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:1rem;border:1px solid #e0e0e0}
.q-num{font-size:12px;color:#666;margin-bottom:.5rem}
.q-text{font-size:15px;line-height:1.65;min-height:50px}
.hint{font-size:12px;color:#2563eb;background:#eff6ff;border-radius:6px;padding:6px 10px;margin-bottom:.75rem}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.opt{display:flex;align-items:flex-start;gap:10px;padding:.75rem 1rem;background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;cursor:pointer;font-size:14px;line-height:1.55;transition:border-color .1s}
.opt:hover{border-color:#aaa}
.opt.selected{border-color:#2563eb;background:#eff6ff}
.opt .circle{width:24px;height:24px;min-width:24px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.opt.selected .circle{background:#2563eb;color:#fff;border-color:#2563eb}
.nav-row{display:flex;gap:8px}
.btn-sec{flex:1;padding:.65rem;border:1.5px solid #ccc;border-radius:9px;background:#fff;font-size:14px;cursor:pointer;color:#333}
.btn-sec:hover{background:#f5f5f5}
.btn-submit{flex:2;padding:.65rem;background:#2563eb;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer}
.btn-submit:hover{background:#1d4ed8}

/* RESULT */
.result-wrap{padding:1.5rem 0}
.result-badge{text-align:center;padding:2rem;border-radius:14px;margin-bottom:1.25rem;border:2px solid}
.result-badge.pass{background:#f0fdf4;border-color:#16a34a}
.result-badge.fail{background:#fef2f2;border-color:#dc2626}
.verdict{font-size:28px;font-weight:700;margin-bottom:.5rem}
.pass .verdict{color:#16a34a}
.fail .verdict{color:#dc2626}
.score-big{font-size:52px;font-weight:700}
.score-lbl{font-size:14px;color:#666;margin-top:4px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat-item{background:#fff;border-radius:10px;padding:.75rem;text-align:center;border:1px solid #e0e0e0}
.stat-item .val{font-size:20px;font-weight:600}
.stat-item .lbl{font-size:12px;color:#666;margin-top:2px}
.wrong-section h3{font-size:15px;font-weight:600;margin-bottom:.75rem}
.wrong-item{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:.9rem;margin-bottom:8px}
.wq{font-size:13px;line-height:1.55;margin-bottom:.5rem}
.wrow{font-size:12px;margin-bottom:3px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;margin-right:4px;font-size:11px}
.tag.my{background:#fee2e2;color:#991b1b}
.tag.ok{background:#dcfce7;color:#166534}
.result-actions{display:flex;gap:10px;margin-top:1.5rem}
</style>
</head>
<body>
<div class="container">

<!-- START -->
<div id="screen-start" class="screen active">
<div class="start-wrap">
  <h1>&#x1F697; Korean Driving License</h1>
  <p class="sub">1,000&#xBB38;&#xC81C; &#xBB38;&#xC81C;&#xC740;&#xD589; &middot; Ng&acirc;n h&agrave;ng 1,000 c&acirc;u h&#7887;i<br>Choose your exam type / &#xC2DC;&#xD5D8; &#xC885;&#xB958;&#xB97C; &#xC120;&#xD0DD;&#xD558;&#xC138;&#xC694;</p>
  <div class="type-cards">
    <div class="type-card" id="card-1" onclick="selectType(1)">
      <div class="label">1&#xC885; &#xBCF4;&#xD1B5;</div>
      <div class="score">70&#xC810;</div>
      <div class="pass">&#xC774;&#xC0C1; &#xD569;&#xACA9;</div>
    </div>
    <div class="type-card" id="card-2" onclick="selectType(2)">
      <div class="label">2&#xC885; &#xBCF4;&#xD1B5;</div>
      <div class="score">60&#xC810;</div>
      <div class="pass">&#xC774;&#xC0C1; &#xD569;&#xACA9;</div>
    </div>
  </div>
  <div class="info-row">
    <div class="info-item"><div class="val">40</div><div class="lbl">Questions</div></div>
    <div class="info-item"><div class="val">40&#xBD84;</div><div class="lbl">Time Limit</div></div>
    <div class="info-item"><div class="val">2.5&#xC810;</div><div class="lbl">Per Question</div></div>
  </div>
  <button class="btn-main" id="btn-start" onclick="startExam()" disabled>Start Exam / &#xC2DC;&#xD5D8; &#xC2DC;&#xC791;</button>
</div>
</div>

<!-- EXAM -->
<div id="screen-exam" class="screen">
  <div class="exam-header">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
      <div class="progress-text" id="ptext"></div>
    </div>
    <div class="timer" id="timer">40:00</div>
  </div>
  <div class="q-card">
    <div class="q-num" id="qnum"></div>
    <div class="q-text" id="qtext"></div>
  </div>
  <div class="hint" id="hint" style="display:none"></div>
  <div class="opts" id="opts"></div>
  <div class="nav-row">
    <button class="btn-sec" onclick="prevQ()">&#x25C4; Prev</button>
    <button class="btn-sec" onclick="nextQ()">Next &#x25BA;</button>
    <button class="btn-submit" onclick="confirmSubmit()">Submit / &#xC81C;&#xCD9C;</button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
<div class="result-wrap">
  <div class="result-badge" id="rbadge">
    <div class="verdict" id="verdict"></div>
    <div class="score-big" id="sbig"></div>
    <div class="score-lbl" id="slbl"></div>
  </div>
  <div class="stat-grid">
    <div class="stat-item"><div class="val" id="sc"></div><div class="lbl">Correct &#x2713;</div></div>
    <div class="stat-item"><div class="val" id="sw"></div><div class="lbl">Wrong &#x2717;</div></div>
    <div class="stat-item"><div class="val" id="sp"></div><div class="lbl">Pass Score</div></div>
  </div>
  <div class="wrong-section">
    <h3 id="wtitle"></h3>
    <div id="wlist"></div>
  </div>
  <div class="result-actions">
    <button class="btn-sec" style="flex:1" onclick="retryExam()">Retry / &#xB2E4;&#xC2DC; &#xD480;&#xAE30;</button>
    <button class="btn-main" style="flex:1;width:auto" onclick="goHome()">Home / &#xCC98;&#xC74C;&#xC73C;&#xB85C;</button>
  </div>
</div>
</div>

</div>

const ALL_Q=JSON.parse(decodeURIComponent(escape(atob(B64))));

let selType=null,examQ=[],userAns=[],curIdx=0,timerID=null,secLeft=2400;

function selectType(t){
  selType=t;
  document.getElementById('card-1').classList.toggle('selected',t===1);
  document.getElementById('card-2').classList.toggle('selected',t===2);
  document.getElementById('btn-start').disabled=false;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function startExam(){
  if(!selType)return;
  examQ=shuffle(ALL_Q).slice(0,40);
  userAns=examQ.map(function(){return new Set();});
  curIdx=0;secLeft=2400;
  showScreen('exam');
  renderQ();
  clearInterval(timerID);
  timerID=setInterval(function(){secLeft--;updateTimer();if(secLeft<=0){clearInterval(timerID);submitExam();}},1000);
}

function updateTimer(){
  var m=Math.floor(secLeft/60),s=secLeft%60;
  var el=document.getElementById('timer');
  el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  el.className='timer'+(secLeft<=300?' warn':'');
}

function renderQ(){
  var q=examQ[curIdx],total=examQ.length;
  var answered=userAns.filter(function(s){return s.size>0;}).length;
  var isMulti=q.a.length>1;
  document.getElementById('pfill').style.width=((curIdx+1)/total*100)+'%';
  document.getElementById('ptext').textContent=(curIdx+1)+' / '+total+' (Answered: '+answered+')';
  document.getElementById('qnum').textContent='Q'+(curIdx+1);
  document.getElementById('qtext').textContent=q.q;
  var hint=document.getElementById('hint');
  if(isMulti){hint.style.display='block';hint.textContent='※ Choose '+q.a.length+' correct answers / 정답 '+q.a.length+'개 선택';}
  else{hint.style.display='none';}
  var labels=['①','②','③','④','⑤'];
  var optsEl=document.getElementById('opts');
  optsEl.innerHTML='';
  q.o.forEach(function(opt,i){
    var sel=userAns[curIdx].has(i+1);
    var div=document.createElement('div');
    div.className='opt'+(sel?' selected':'');
    var circle=document.createElement('span');
    circle.className='circle';
    circle.textContent=labels[i];
    var text=document.createElement('span');
    text.textContent=opt;
    div.appendChild(circle);div.appendChild(text);
    div.onclick=(function(num,multi,needed){return function(){toggleOpt(num,multi,needed);};})(i+1,isMulti,q.a.length);
    optsEl.appendChild(div);
  });
}

function toggleOpt(num,isMulti,needed){
  var ans=userAns[curIdx];
  if(ans.has(num)){ans.delete(num);}
  else{
    if(!isMulti)ans.clear();
    else if(ans.size>=needed){var f=ans.values().next().value;ans.delete(f);}
    ans.add(num);
  }
  renderQ();
}

function prevQ(){if(curIdx>0){curIdx--;renderQ();}}
function nextQ(){if(curIdx<examQ.length-1){curIdx++;renderQ();}}

function confirmSubmit(){
  var unanswered=examQ.length-userAns.filter(function(s){return s.size>0;}).length;
  var msg=unanswered>0?unanswered+' questions unanswered. Submit anyway?
미응답 '+unanswered+'문제. 제출할까요?':'Submit exam?
시험을 제출하시겠습니까?';
  if(confirm(msg))submitExam();
}

function submitExam(){
  clearInterval(timerID);
  var correct=0,wrongItems=[];
  examQ.forEach(function(q,idx){
    var ua=[].concat(Array.from(userAns[idx])).sort(function(a,b){return a-b;});
    var ca=[].concat(q.a).sort(function(a,b){return a-b;});
    if(JSON.stringify(ua)===JSON.stringify(ca))correct++;
    else wrongItems.push({q:q,ua:ua,ca:ca});
  });
  var score=correct*2.5;
  var passScore=selType===1?70:60;
  var passed=score>=passScore;
  var badge=document.getElementById('rbadge');
  badge.className='result-badge '+(passed?'pass':'fail');
  document.getElementById('verdict').textContent=passed?'✓ PASS / 합격':'✗ FAIL / 불합격';
  document.getElementById('sbig').textContent=score.toFixed(1)+'점';
  document.getElementById('slbl').textContent=(selType===1?'1종 보통':'2종 보통')+' · Pass: '+passScore+'점';
  document.getElementById('sc').textContent=correct+'개';
  document.getElementById('sw').textContent=(40-correct)+'개';
  document.getElementById('sp').textContent=passScore+'점';
  document.getElementById('wtitle').textContent='Wrong Answers / 오답 ('+wrongItems.length+'개)';
  var labels=['①','②','③','④','⑤'];
  var wlist=document.getElementById('wlist');
  wlist.innerHTML='';
  wrongItems.forEach(function(item,wi){
    var q=item.q,ua=item.ua,ca=item.ca;
    var div=document.createElement('div');
    div.className='wrong-item';
    var qtext=q.q.length>90?q.q.slice(0,90)+'…':q.q;
    var myStr=ua.length?ua.map(function(n){return labels[n-1]+' '+(q.o[n-1]||'').slice(0,25);}).join(', '):'(no answer)';
    var corrStr=ca.map(function(n){return labels[n-1]+' '+(q.o[n-1]||'').slice(0,25);}).join(', ');
    var wq=document.createElement('div');wq.className='wq';
    var b=document.createElement('b');b.textContent='Q'+(wi+1)+'. ';
    wq.appendChild(b);wq.appendChild(document.createTextNode(qtext));
    var r1=document.createElement('div');r1.className='wrow';
    var t1=document.createElement('span');t1.className='tag my';t1.textContent='My: '+myStr;
    r1.appendChild(t1);
    var r2=document.createElement('div');r2.className='wrow';
    var t2=document.createElement('span');t2.className='tag ok';t2.textContent='Answer: '+corrStr;
    r2.appendChild(t2);
    div.appendChild(wq);div.appendChild(r1);div.appendChild(r2);
    wlist.appendChild(div);
  });
  showScreen('result');
}

function retryExam(){startExam();}
function goHome(){clearInterval(timerID);showScreen('start');}
</script>
